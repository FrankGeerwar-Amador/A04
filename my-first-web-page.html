<!DOCTYPE html>
<!-- Declares the document type and tells the browser this is an HTML5 document -->


<html lang="en">
<!-- The root element of the HTML page. 'lang="en"' specifies the language as English -->


<head>
    <meta charset="UTF-8">
    <!-- Sets the character encoding to UTF-8 so special characters display properly -->


    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the webpage responsive on different screen sizes (phones, tablets, etc.) -->


    <title>My First Web Page</title>
    <!-- The title that appears on the browser tab -->
</head>


<body>
    <!-- The body contains all visible content of the webpage -->


    <h1>Student Information</h1>
    <!-- Main heading displayed on the page -->


    <p><strong>Name:</strong> Frank Geerwar-Amador</p>


    <p><strong>Username:</strong> fag22@njit.edu</p>
    <!-- Paragraph displaying the username.-->


    <p><strong>Course Name:</strong> Introduction to Website Development</p>
    <!-- Paragraph displaying the course name.-->


    <p><strong>Course Number & Section:</strong> IS117-002</p>
    <!-- Paragraph displaying the course number and section.-->


    <footer>
        <!-- The footer section usually contains copyright information or page details -->


        <p>&copy; 2026 Frank Geerwar-Amador | Due Date: March 3, 2026</p>
        <!--
        &copy; is the HTML entity for the copyright symbol (©)
        Replace the due date if necessary.
        -->
    </footer>


</body>
<!-- Closing tag for the body -->


</html>
<!-- Closing tag for the HTML document -->
